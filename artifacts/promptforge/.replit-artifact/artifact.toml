kind = "web"
previewPath = "/"
title = "PromptForge"
version = "1.0.0"
id = "artifacts/promptforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23239

[services.development]
run = "pnpm --filter @workspace/promptforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/promptforge", "run", "build" ]
publicDir = "artifacts/promptforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23239"
BASE_PATH = "/"
